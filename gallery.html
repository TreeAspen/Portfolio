<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Art Gallery | Shu Yang</title>
    <!-- Google Fonts and Font Awesome for icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* CSS Variables for Theming */
        :root {
            --bg-primary: #28233f;
            --bg-secondary: #3a335c;
            --bg-sidebar: rgba(25, 22, 43, 0.95);
            --bg-feature: rgba(80, 71, 117, 0.5);
            --bg-button: rgba(255, 255, 255, 0.25);
            --bg-button-hover: #303582b0;
            --text-primary: rgba(255, 255, 255, 0.75);
            --text-headings: #ffffff;
            --text-button: #ffffff;
            --accent-primary: #a369ff;
            --border-button-hover: rgba(255, 255, 255, 0.5);
            --border-divider: rgba(255, 255, 255, 0.15);
            --shadow: none;
        }

        body.light-mode {
            --bg-primary: #f4f7f9;
            --bg-secondary: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-feature: #ffffff;
            --bg-button: rgba(105, 77, 229, 0.25);
            --bg-button-hover: #5038b3;
            --text-primary: #5f6c7b;
            --text-headings: #1d2d35;
            --text-button: #4338ca;
            --accent-primary: #694de5;
            --border-button-hover: #694de5;
            --border-divider: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
        }

        /* Base and Reset */
        *, *::before, *::after { box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            overflow-x: hidden;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Typography and Links */
        h1, h2, h3, h4, h5 { color: var(--text-headings); font-weight: 700; line-height: 1.2; margin: 0 0 1rem 0; transition: color 0.3s ease; }
        h1 { font-size: 2.5rem; }
        h2 { font-size: 2rem; }
        p { margin: 0 0 1rem 0; line-height: 1.7; }
        a { color: var(--accent-primary); text-decoration: none; transition: color 0.2s ease; }
        a:hover { color: var(--text-headings); }
        
        /* Header for Subpage */
        #page-header {
            position: sticky; top: 0;
            background: var(--bg-sidebar);
            padding: 0.75em 1.5em;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            transition: background-color 0.3s ease;
        }
        #page-header .back-link {
            color: var(--text-primary);
            font-weight: 500;
            font-size: 1rem;
            transition: color 0.2s ease;
            position: relative;
            padding: 0.5em 0;
        }
        #page-header .back-link::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 1px;
            background-color: var(--accent-primary);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease-out;
        }
        #page-header .back-link:hover::after {
            transform: scaleX(1);
        }
        #page-header .back-link .fa-fw {
            margin-right: 0.5em;
        }
        
        /* Main Content Wrapper */
        .wrapper { padding: 4em 3em; animation: fadeIn 1s ease-out; }
        .inner { max-width: 60em; margin: 0 auto; }
        
        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5em;
            align-items: start;
        }
        .gallery-item {
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
        }
        .gallery-item::after {
            content: '\f00e'; /* Font Awesome search-plus icon */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            color: white;
            font-size: 2rem;
            background-color: rgba(0,0,0,0.5);
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        .gallery-item:hover {
            transform: scale(1.03);
            box-shadow: 0 0 25px -5px var(--accent-primary);
        }
        .gallery-item:hover::after {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            object-fit: contain;
            display: block;
        }

        /* Lightbox Modal */
        #lightbox {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.85);
            z-index: 10002;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2em;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }
        #lightbox.active {
            opacity: 1;
            pointer-events: auto;
        }
        #lightbox img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 8px;
            transform: scale(0.8);
            transition: transform 0.3s ease;
        }
        #lightbox.active img {
            transform: scale(1);
        }
        .lightbox-close {
            position: absolute;
            top: 2em;
            right: 2em;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            transition: transform 0.2s ease;
        }
        .lightbox-close:hover {
            transform: scale(1.2);
        }

        /* Theme Toggle */
        .theme-switch-wrapper { display: flex; align-items: center; justify-content: center; }
        .theme-switch { display: inline-block; height: 26px; position: relative; width: 50px; }
        .theme-switch input { display:none; }
        .slider { background-color: #4a426b; bottom: 0; cursor: pointer; left: 0; position: absolute; right: 0; top: 0; transition: .4s; }
        .slider:before {
            content: "\f186"; font-family: "Font Awesome 6 Free"; font-weight: 900;
            color: #28233f;
            display: flex; align-items: center; justify-content: center;
            background-color: #fff; bottom: 4px; height: 18px; left: 4px;
            position: absolute; width: 18px; transition: .4s;
        }
        input:checked + .slider { background-color: #ccc; }
        input:checked + .slider:before { content: "\f185"; transform: translateX(24px); }
        .slider.round { border-radius: 34px; }
        .slider.round:before { border-radius: 50%; }

        /* Animated Background */
        .background-shapes { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .background-shapes li {
            position: absolute; display: block; list-style: none; width: 20px; height: 20px;
            background: rgba(163, 105, 255, 0.15); animation: float 25s linear infinite; bottom: -150px;
        }
        body.light-mode .background-shapes li { background: rgba(105, 77, 229, 0.1); border: none; }
        body.light-mode .background-shapes li:nth-child(2), body.light-mode .background-shapes li:nth-child(5), body.light-mode .background-shapes li:nth-child(7), body.light-mode .background-shapes li:nth-child(9) {
            background: transparent; border: 2px solid rgba(105, 77, 229, 0.15);
        }
        .background-shapes li:nth-child(1) { left: 25%; width: 80px; height: 80px; animation-delay: 0s; }
        .background-shapes li:nth-child(2) { left: 10%; width: 20px; height: 20px; animation-delay: 2s; animation-duration: 12s; background: transparent; border: 2px solid rgba(163, 105, 255, 0.25); }
        .background-shapes li:nth-child(3) { left: 70%; width: 20px; height: 20px; animation-delay: 4s; }
        .background-shapes li:nth-child(4) { left: 40%; width: 60px; height: 60px; animation-delay: 0s; animation-duration: 18s; }
        .background-shapes li:nth-child(5) { left: 65%; width: 20px; height: 20px; animation-delay: 0s; background: transparent; border: 2px solid rgba(163, 105, 255, 0.25); }
        .background-shapes li:nth-child(6) { left: 75%; width: 110px; height: 110px; animation-delay: 3s; }
        .background-shapes li:nth-child(7) { left: 35%; width: 150px; height: 150px; animation-delay: 7s; background: transparent; border: 2px solid rgba(163, 105, 255, 0.25); }
        .background-shapes li:nth-child(8) { left: 50%; width: 25px; height: 25px; animation-delay: 15s; animation-duration: 45s; }
        .background-shapes li:nth-child(9) { left: 20%; width: 15px; height: 15px; animation-delay: 2s; animation-duration: 35s; background: transparent; border: 2px solid rgba(163, 105, 255, 0.25); }
        .background-shapes li:nth-child(10) { left: 85%; width: 150px; height: 150px; animation-delay: 0s; animation-duration: 11s; }
        
        /* Animations */
        @keyframes float { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-1000px) rotate(720deg); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        /* Responsive */
        @media (max-width: 980px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 736px) {
            h1 { font-size: 2rem; }
            .wrapper { padding: 2em 1em; }
            .gallery-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    
    <ul class="background-shapes">
       <li></li> <li></li> <li></li> <li></li> <li></li>
       <li></li> <li></li> <li></li> <li></li> <li></li>
    </ul>

    <!-- Header -->
    <header id="page-header">
        <a href="index.html" class="back-link"><i class="fas fa-arrow-left fa-fw"></i> Back to Portfolio</a>
        <div class="theme-switch-wrapper">
            <label class="theme-switch" for="theme-toggle">
                <input type="checkbox" id="theme-toggle" />
                <span class="slider round"></span>
            </label>
        </div>
    </header>

    <!-- Main Content -->
    <div class="wrapper">
        <div class="inner">

            <h1>My Art Gallery</h1>
            <p style="color: var(--text-secondary); max-width: 65ch;">Beyond the world of design and technology, painting is a passion that allows me to explore creativity in a different medium. Here is a selection of my works.</p>

            <div class="gallery-grid">
                <div class="gallery-item"><img src="images/gallery/IMG_0172.JPG" alt="Painting 1"></div>
                <div class="gallery-item"><img src="images/gallery/IMG_0173.JPG" alt="Painting 2"></div>
                <div class="gallery-item"><img src="images/gallery/IMG_0174.JPG" alt="Painting 3"></div>
                <div class="gallery-item"><img src="images/gallery/IMG_0175.JPG" alt="Painting 4"></div>
                <div class="gallery-item"><img src="images/gallery/IMG_0176.JPG" alt="Painting 5"></div>
                <div class="gallery-item"><img src="images/gallery/IMG_0177.JPG" alt="Painting 6"></div>
                <div class="gallery-item"><img src="images/gallery/IMG_0178.JPG" alt="Painting 7"></div>
                <div class="gallery-item"><img src="images/gallery/IMG_0180.JPG" alt="Painting 8"></div>
                <div class="gallery-item"><img src="images/gallery/IMG_0181.JPG" alt="Painting 9"></div>
                <div class="gallery-item"><img src="images/gallery/IMG_0182.JPG" alt="Painting 10"></div>
            </div>

        </div>
    </div>
    
    <!-- Lightbox Modal -->
    <div id="lightbox">
        <span class="lightbox-close">&times;</span>
        <img id="lightbox-img" src="">
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const body = document.body;
            const themeToggle = document.getElementById('theme-toggle');

            // --- Theme Switcher ---
            const currentTheme = localStorage.getItem('theme');
            function setTheme(theme) {
                if (theme === 'light') {
                    body.classList.add('light-mode');
                    themeToggle.checked = true;
                } else {
                    body.classList.remove('light-mode');
                    themeToggle.checked = false;
                }
                localStorage.setItem('theme', theme);
            }
            if (currentTheme) {
                setTheme(currentTheme);
            }
            themeToggle.addEventListener('change', () => {
                setTheme(themeToggle.checked ? 'light' : 'dark');
            });

            // --- Lightbox Logic ---
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            const galleryItems = document.querySelectorAll('.gallery-item');
            const closeBtn = document.querySelector('.lightbox-close');

            galleryItems.forEach(item => {
                item.addEventListener('click', () => {
                    const imgSrc = item.querySelector('img').src;
                    lightboxImg.src = imgSrc;
                    lightbox.classList.add('active');
                });
            });

            const closeLightbox = () => {
                lightbox.classList.remove('active');
            };

            closeBtn.addEventListener('click', closeLightbox);
            lightbox.addEventListener('click', (e) => {
                if (e.target !== lightboxImg) {
                    closeLightbox();
                }
            });
        });
    </script>
</body>
</html>
